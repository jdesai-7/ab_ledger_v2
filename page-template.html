<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGE TITLE — AB LedgerWorks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/global.css">
<script src="js/layout.js" defer></script>
<style>
  /* ── PAGE-SPECIFIC STYLES ── */

  /* Inner pages need top padding to clear the fixed nav */
  .page-hero {
    background: var(--navy);
    padding: 160px 0 80px;
    text-align: center;
  }
  .page-hero-label { color: var(--accent-light); margin-bottom: 16px; }
  .page-hero-title {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 5vw, 4rem);
    color: var(--white); font-weight: 400;
    line-height: 1.1; letter-spacing: -0.02em;
  }
  .page-hero-sub {
    font-family: var(--font-body);
    font-size: 1.05rem; color: rgba(255,255,255,0.65);
    max-width: 52ch; margin: 20px auto 0; line-height: 1.85;
  }

</style>
</head>
<body>

<!-- Nav and footer are injected automatically by layout.js -->

<!-- ═══════════════ PAGE HERO ═══════════════ -->
<section class="page-hero">
  <div class="container">
    <div class="section-label page-hero-label">SECTION LABEL</div>
    <h1 class="page-hero-title">Page Heading</h1>
    <p class="page-hero-sub">Short page description goes here.</p>
  </div>
</section>

<!-- ═══════════════ PAGE CONTENT ═══════════════ -->
<section class="section">
  <div class="container">
    <!-- content here -->
  </div>
</section>

<script>
  /* ── PAGE-SPECIFIC JS ── */
</script>
</body>
</html>
